<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rosa Choi-Kahng - Digital Business Card</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://use.typekit.net/jpe7fwd.css">
</head>
<body>
    <div class="card">
        <div class="header">
            <img src="logo.svg" class="simply-logo" alt="remax simply logo">
            
            <div class="profile">
                <img src="profile-img.png" alt="Rosa Choi-Kahng's Profile Picture" class="profile-img">
            </div>
            <div class="profile-outline"></div>
        </div>
        <div class="header-line">
            <div class="header-line-slash"></div>
        </div>
        <div class="card-body">
            <div class="bio">
                <div class="realtor">Realtor</div>
                <div class="agent-name">Rosa Choi-Kahng</div>
            </div>
            <a class="contact" href="https://docs.google.com/uc?export=download&id=12cjEWF-V4n75_7b3-HS2E7Vm3YyF92Pb">Add Contact</a>
            <div class="call-email">
                <a href="tel:+12019650782" class="call">Call</a>
                <a href="mailto:rosa@simplyre.com" class="email">Email</a>
            </div>
            <div class="info-box">
                " Simply Better "
                <br>
                <br>
                Office Address:
                <br>
                120 Sylvan Ave, Suite 106
                <br>
                Englewood Cliffs, NJ 07632
            </div>
            <div class="sns">
                <a href="https://www.threads.com/@njrealtor_rosa" target="_blank" class="sns-item">
                    <img src="Threads.svg" ></img>
                </a>
                <a href="https://www.instagram.com/njrealtor_rosa/" target="_blank" class="sns-item">
                    <img src="instagram.svg" ></img>
                </a>
                <a href="https://rosachoikahng.remaxsimplynj.com/" target="_blank" class="sns-item">
                    <img src="web.svg" ></img>
                </a>
            </div>
        </div>        
        <div class="body-line">
        </div>
    </div>
</body>

</html>
